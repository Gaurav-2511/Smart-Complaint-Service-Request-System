<nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
  <div class="container">
    <a class="navbar-brand fw-bold" routerLink="/">
      Smart Complaint System
    </a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavbar">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="mainNavbar">
      <ul class="navbar-nav ms-auto align-items-lg-center">

        <ng-container *ngIf="!isLoggedIn()">
          <li class="nav-item">
            <a class="nav-link" routerLink="/login" routerLinkActive="active">Login</a>
          </li>

          <li class="nav-item">
            <a class="btn btn-light btn-sm ms-lg-2" routerLink="/register">
              Register
            </a>
          </li>
        </ng-container>

        <ng-container *ngIf="isLoggedIn() && getRole() === 'USER'">
          <li class="nav-item">
            <a class="nav-link" routerLink="/user/dashboard" routerLinkActive="active">Dashboard</a>
          </li>

          <li class="nav-item">
            <a class="nav-link" routerLink="/user/add-complaint" routerLinkActive="active">Add Complaint</a>
          </li>

          <li class="nav-item">
            <a class="nav-link" routerLink="/user/my-complaints" routerLinkActive="active">My Complaints</a>
          </li>
        </ng-container>

        <ng-container *ngIf="isLoggedIn() && getRole() === 'ADMIN'">
          <li class="nav-item">
            <a class="nav-link" routerLink="/admin/dashboard" routerLinkActive="active">Dashboard</a>
          </li>

          <li class="nav-item">
            <a class="nav-link" routerLink="/admin/complaints" routerLinkActive="active">Complaints</a>
          </li>
        </ng-container>

        <ng-container *ngIf="isLoggedIn()">
          <li class="nav-item ms-lg-3">
            <span class="navbar-text text-white small">
              Hi, {{ getName() || 'User' }}
            </span>
          </li>

          <li class="nav-item ms-lg-2">
            <button class="btn btn-outline-light btn-sm" (click)="logout()">
              Logout
            </button>
          </li>
        </ng-container>

      </ul>
    </div>
  </div>
</nav>
