<div class="auth-wrapper">
  <div class="container">
    <div class="row justify-content-center align-items-center min-vh-80">
      <div class="col-md-6 col-lg-5">

        <div class="card auth-card shadow">
          <div class="card-body p-4">

            <div class="text-center mb-4">
              <h3 class="fw-bold text-primary">Login</h3>
              <p class="text-muted mb-0">Welcome back to Smart Complaint System</p>
            </div>

            <div *ngIf="successMessage" class="alert alert-success">
              {{ successMessage }}
            </div>

            <div *ngIf="errorMessage" class="alert alert-danger">
              {{ errorMessage }}
            </div>

            <form (ngSubmit)="onLogin()">

              <div class="mb-3">
                <label class="form-label">Email Address</label>
                <input
                  type="email"
                  class="form-control"
                  placeholder="Enter email"
                  name="email"
                  [(ngModel)]="loginRequest.email"
                  required
                />
              </div>

              <div class="mb-3">
                <label class="form-label">Password</label>
                <input
                  type="password"
                  class="form-control"
                  placeholder="Enter password"
                  name="password"
                  [(ngModel)]="loginRequest.password"
                  required
                />
              </div>

              <button class="btn btn-primary w-100" type="submit" [disabled]="isLoading">
                <span *ngIf="isLoading">Logging in...</span>
                <span *ngIf="!isLoading">Login</span>
              </button>

            </form>

            <p class="text-center mt-3 mb-0">
              Don’t have an account?
              <a routerLink="/register" class="text-decoration-none fw-semibold">
                Register here
              </a>
            </p>

          </div>
        </div>

      </div>
    </div>
  </div>
</div>
