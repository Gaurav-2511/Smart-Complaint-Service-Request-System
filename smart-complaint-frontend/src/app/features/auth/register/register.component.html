<div class="auth-wrapper">
  <div class="container">
    <div class="row justify-content-center align-items-center min-vh-80">
      <div class="col-md-7 col-lg-6">

        <div class="card auth-card shadow">
          <div class="card-body p-4">

            <div class="text-center mb-4">
              <h3 class="fw-bold text-primary">Create Account</h3>
              <p class="text-muted mb-0">Register as a user and raise complaints easily</p>
            </div>

            <div *ngIf="successMessage" class="alert alert-success">
              {{ successMessage }}
            </div>

            <div *ngIf="errorMessage" class="alert alert-danger">
              {{ errorMessage }}
            </div>

            <form (ngSubmit)="onRegister()">

              <div class="mb-3">
                <label class="form-label">Full Name</label>
                <input
                  type="text"
                  class="form-control"
                  placeholder="Enter full name"
                  name="name"
                  [(ngModel)]="registerRequest.name"
                  required
                />
              </div>

              <div class="mb-3">
                <label class="form-label">Email Address</label>
                <input
                  type="email"
                  class="form-control"
                  placeholder="Enter email"
                  name="email"
                  [(ngModel)]="registerRequest.email"
                  required
                />
              </div>

              <div class="mb-3">
                <label class="form-label">Password</label>
                <input
                  type="password"
                  class="form-control"
                  placeholder="Enter password"
                  name="password"
                  [(ngModel)]="registerRequest.password"
                  required
                />
              </div>

              <button class="btn btn-primary w-100" type="submit" [disabled]="isLoading">
                <span *ngIf="isLoading">Creating account...</span>
                <span *ngIf="!isLoading">Register</span>
              </button>

            </form>

            <p class="text-center mt-3 mb-0">
              Already have an account?
              <a routerLink="/login" class="text-decoration-none fw-semibold">
                Login here
              </a>
            </p>

          </div>
        </div>

      </div>
    </div>
  </div>
</div>
