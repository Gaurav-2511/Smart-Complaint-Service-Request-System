<div class="container mt-4">
  <div class="card shadow-sm">
    <div class="card-header bg-primary text-white">
      <h4 class="mb-0">Add Complaint</h4>
    </div>

    <div class="card-body">
      <div *ngIf="successMessage" class="alert alert-success">
        {{ successMessage }}
      </div>

      <div *ngIf="errorMessage" class="alert alert-danger">
        {{ errorMessage }}
      </div>

      <form (ngSubmit)="submitComplaint()" #complaintForm="ngForm">
        <div class="mb-3">
          <label class="form-label">Title</label>
          <input
            type="text"
            name="title"
            class="form-control"
            placeholder="Enter complaint title"
            [(ngModel)]="complaint.title"
            required
          />

          <small class="text-danger" *ngIf="complaintForm.submitted && !complaint.title">
            Title is required
          </small>
        </div>

        <div class="mb-3">
          <label class="form-label">Description</label>
          <textarea
            name="description"
            class="form-control"
            rows="5"
            placeholder="Enter complaint description"
            [(ngModel)]="complaint.description"
            required>
          </textarea>

          <small class="text-danger" *ngIf="complaintForm.submitted && !complaint.description">
            Description is required
          </small>
        </div>

        <button type="submit" class="btn btn-primary" [disabled]="isLoading">
          {{ isLoading ? 'Submitting...' : 'Submit Complaint' }}
        </button>

        <a routerLink="/user/my-complaints" class="btn btn-secondary ms-2">
          View My Complaints
        </a>
      </form>
    </div>
  </div>
</div>
