<div class="page-wrapper">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-7">

        <div class="card shadow">
          <div class="card-body p-4">
            <h3 class="mb-3">Add Complaint</h3>
            <p class="text-muted">
              Fill complaint details and submit your request.
            </p>

            <form (ngSubmit)="onSubmit()">

              <div class="mb-3">
                <label class="form-label">Complaint Title</label>
                <input
                  type="text"
                  name="title"
                  class="form-control"
                  placeholder="Example: Water leakage issue"
                  [(ngModel)]="title"
                  required
                />
              </div>

              <div class="mb-3">
                <label class="form-label">Description</label>
                <textarea
                  name="description"
                  class="form-control"
                  rows="5"
                  placeholder="Describe your complaint"
                  [(ngModel)]="description"
                  required
                ></textarea>
              </div>

              <button type="submit" class="btn btn-primary">
                Submit Complaint
              </button>

            </form>

          </div>
        </div>

      </div>
    </div>
  </div>
</div>
