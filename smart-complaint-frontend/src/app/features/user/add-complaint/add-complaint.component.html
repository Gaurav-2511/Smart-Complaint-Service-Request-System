<div class="container py-4">

  <div class="row justify-content-center">
    <div class="col-lg-7">

      <div class="mb-3">
        <h3 class="page-title">Add Complaint</h3>
        <p class="text-muted">
          Fill the form below to submit your complaint.
        </p>
      </div>

      <div class="card shadow-sm border-0">
        <div class="card-body p-4">

          <div *ngIf="successMessage" class="alert alert-success">
            {{ successMessage }}
          </div>

          <div *ngIf="errorMessage" class="alert alert-danger">
            {{ errorMessage }}
          </div>

          <form (ngSubmit)="addComplaint()">

            <div class="mb-3">
              <label class="form-label fw-semibold">Complaint Title</label>
              <input
                type="text"
                class="form-control"
                name="title"
                placeholder="Example: Water leakage in classroom"
                [(ngModel)]="complaintRequest.title"
                required
              />
            </div>

            <div class="mb-3">
              <label class="form-label fw-semibold">Description</label>
              <textarea
                class="form-control"
                name="description"
                rows="5"
                placeholder="Write complaint details here..."
                [(ngModel)]="complaintRequest.description"
                required
              ></textarea>
            </div>

            <div class="d-flex gap-2">
              <button class="btn btn-primary" type="submit" [disabled]="loading">
                <span *ngIf="loading">Submitting...</span>
                <span *ngIf="!loading">Submit Complaint</span>
              </button>

              <a routerLink="/user/dashboard" class="btn btn-outline-secondary">
                Cancel
              </a>
            </div>

          </form>

        </div>
      </div>

    </div>
  </div>

</div>
